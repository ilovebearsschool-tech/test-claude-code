name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"
      - "data/tv_prices.csv"
  workflow_dispatch:
  # Also triggered by the scraper workflow after it commits new CSV data
  workflow_run:
    workflows: ["Weekly TV Price Tracker"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # serves the whole repo root (index.html + data/)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
