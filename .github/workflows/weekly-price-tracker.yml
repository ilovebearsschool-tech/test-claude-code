name: Weekly TV Price Tracker

on:
  schedule:
    # Every Monday at 09:00 HKT (01:00 UTC)
    - cron: "0 1 * * 1"
  workflow_dispatch:  # allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/tv_prices.csv back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run price scraper
        run: python scraper.py

      - name: Commit updated price data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tv_prices.csv
          git diff --cached --quiet || git commit -m "chore: weekly TV price snapshot $(date -u +%Y-%m-%d)"
          git push origin HEAD
